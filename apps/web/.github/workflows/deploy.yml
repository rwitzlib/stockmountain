name: Deploy

on:
  push:
    paths:
      - apps/web/**
      - infra/tf/app/**
      - infra/tf/core/**
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy to
        required: true
        type: choice
        options:
          - dev
        default: dev

defaults:
  run:
    working-directory: apps/web

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Docker Build Push
        uses: rwitzlib/github-action-templates/.github/actions/docker-build-push@v1.0.0
        with:
          ecr_repo: lad-${{ inputs.environment || 'dev' }}-stockmountain-app
          dockerfile: ./Dockerfile
          context: ./
        env:
          AWS_REGION: us-east-2
          AWS_DEPLOYMENT_ROLE: ${{ secrets.AWS_DEPLOYMENT_ROLE }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      id-token: write
      contents: read
    env:
      TF_ENV: ${{ inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          mask-aws-account-id: true
          role-duration-seconds: 900
          role-to-assume: ${{ secrets.AWS_DEPLOYMENT_ROLE }}
          role-session-name: gha-stockmountain-${{ github.run_id }}
          aws-region: us-east-2

      - uses: hashicorp/setup-terraform@v3

      - name: Write deploy tfvars
        working-directory: infra
        run: |
          REF_NAME=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          cat > "${TF_ENV}.tfvars" <<EOF
          environment = "${TF_ENV}"
          region = "us-east-2"
          image_tag = "${REF_NAME}"
          deploy_run_id = "${{ github.run_id }}"
          deploy_actor = "${{ github.actor }}"
          enable_web_deploy = true
          EOF

      - name: Terraform deploy
        working-directory: infra/tf/app
        run: |
          terraform init -backend-config="../config/${TF_ENV}.app.backend.hcl"
          terraform apply -auto-approve \
            -var-file="../../${TF_ENV}.tfvars" \
            -target=restapi_object.web_app_deploy
