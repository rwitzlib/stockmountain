name: Application Deploy

on:
  push:
    paths:
      - .github/workflows/app-deploy.yml
      - apps/**
      - packages/**
      - tests/**
      - infra/tf/app/**
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy to
        required: true
        type: choice
        options:
          - dev
        default: dev

jobs:
  deploy:
    uses: rwitzlib/github-action-templates/.github/workflows/dotnet-container-deployment.yml@v1.10.0
    permissions:
      id-token: write
      contents: read
      packages: read
      actions: read
    with:
      environment: ${{ inputs.environment || 'dev' }}
      docker: |
        [
          {
            "ecr_repo": "stockmountain-${{ inputs.environment || 'dev' }}-market-data-aggregator",
            "dockerfile": "apps/market-data-aggregator/Dockerfile",
            "context": ".",
            "build-args": ""
          },
          {
            "ecr_repo": "stockmountain-${{ inputs.environment || 'dev' }}-backtester",
            "dockerfile": "apps/backtester/Dockerfile",
            "context": ".",
            "build-args": ""
          },
          {
            "ecr_repo": "stockmountain-${{ inputs.environment || 'dev' }}-api",
            "dockerfile": "apps/api/Dockerfile",
            "context": ".",
            "build-args": ""
          },
          {
            "ecr_repo": "stockmountain-${{ inputs.environment || 'dev' }}-optimus",
            "dockerfile": "apps/paper-bot-runner/Optimus/Dockerfile",
            "context": ".",
            "build-args": ""
          }
        ]
      solution_directory: .
      global_json_file: global.json
      terraform_directory: infra/tf/app
      terraform_variables: |
        {
          "environment": "${{ inputs.environment || 'dev' }}",
          "image_tag": "${{ github.ref_name }}"
        }
    secrets: inherit

  railway_deploy:
    needs: deploy
    if: github.event_name == 'workflow_dispatch' || github.ref_name == 'master'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: web
            terraform_output: web_aws_environment_variables
          - name: api
            terraform_output: api_aws_environment_variables
          - name: optimus
            terraform_output: optimus_aws_environment_variables
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          mask-aws-account-id: true
          role-duration-seconds: 900
          role-to-assume: ${{ secrets.AWS_DEPLOYMENT_ROLE }}
          role-session-name: gha-railway-${{ matrix.service.name }}-${{ github.run_id }}
          aws-region: us-east-2

      - name: Terraform Setup
        uses: hashicorp/setup-terraform@v4
        with:
          # The wrapper pollutes stdout, breaking `terraform output -json`
          terraform_wrapper: false

      - name: Push terraform outputs to Railway
        working-directory: infra/tf/app
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          terraform init -backend-config="./backend/${{ inputs.environment || 'dev' }}.tfbackend"

          vars_json=$(terraform output -json ${{ matrix.service.terraform_output }})

          # Mask every non-empty value before anything else can log it
          echo "$vars_json" | jq -r '.[] | select(. != null and . != "")' | while IFS= read -r value; do
            echo "::add-mask::$value"
          done

          npm install --global @railway/cli

          # NUL-delimited so values survive any character; empty values are dropped
          # (an unset TF_VAR_* defaults to "" and the Railway CLI rejects `KEY=`).
          set_args=()
          while IFS= read -r -d '' pair; do
            set_args+=(--set "$pair")
          done < <(echo "$vars_json" | jq -j 'to_entries[] | select(.value != null and .value != "") | "\(.key)=\(.value)\u0000"')

          if [ ${#set_args[@]} -eq 0 ]; then
            echo "No non-empty variables to push; skipping."
            exit 0
          fi

          railway variables "${set_args[@]}" --service ${{ matrix.service.name }} --skip-deploys
