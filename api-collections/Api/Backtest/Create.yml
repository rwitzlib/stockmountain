info:
  name: Create
  type: http
  seq: 1

http:
  method: POST
  url: https://{{base_url}}{{port}}/api/backtest
  body:
    type: json
    data: |-
      {
        "Start": "2025-01-01",
        "End": "2026-06-30",
        "PositionSettings": {
          "StartingBalance": 100000,
          "MaxConcurrentPositions": 100,
          "Model": {
            "Type": "Fixed",
            "Size": 10000
          },
          "Cooldown": {
            "Multiplier": 15,
            "Timespan": "minute"
          }
        },
        "EntrySettings": {
          "Filters": [
            "rsi(30,70,14,ema) > 70 [1m]",
            "float < 10000000",
            "close > 1.00 [1m]",
            "volume > 100000 [1m,5]"
            "time < 11:00"
          ]
        },
        "ExitSettings": {
          "StopLoss": {
            "CandleType": "CurrentCandle",
            "PriceActionType": "close",
            "ExitValueType": "percent",
            "Value": 2
          },
          "TakeProfit": {
            "CandleType": "CurrentCandle",
            "PriceActionType": "close",
            "ExitValueType": "percent",
            "Value": 15
          },
          "TimedExit": {
            "Timeframe": {
              "Multiplier": 30,
              "Timespan": "minute"
            }
          }
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setVar("backtest_id", res.body.id)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
