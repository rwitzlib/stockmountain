info:
  name: Inventory
  type: http
  seq: 1

http:
  method: GET
  url: https://{{base_url}}{{port}}/api/market-data/inventory?start=2023-01-01&end=2023-12-31&timespan=minute&multiplier=1
  params:
    - name: start
      value: 2023-01-01
      type: query
    - name: end
      value: 2023-12-31
      type: query
    - name: timespan
      value: minute
      type: query
    - name: multiplier
      value: "1"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
