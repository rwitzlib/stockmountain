info:
  name: Inventory
  type: http
  seq: 1

http:
  method: GET
  url: https://{{base_url}}{{port}}/api/market-data/inventory?start=2026-06-01&end=2026-07-01&timespan=minute
  params:
    - name: start
      value: 2026-06-01
      type: query
    - name: end
      value: 2026-07-01
      type: query
    - name: timespan
      value: minute
      type: query
    - name: multiplier
      value: "1"
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
