info:
  name: Backfill
  type: http
  seq: 1

http:
  method: POST
  url: https://{{base_url}}{{port}}/api/market-data/backfill
  body:
    type: json
    data: |-
      {
        "start": "2023-01-01",
        "end": "2023-12-31",
        "timespans": [
          "minute",
          "hour",
          "day"
        ],
        "multiplier": 1,
        "maxConcurrency": 5,
        "overwrite": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
