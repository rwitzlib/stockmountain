info:
  name: Api
  type: folder
  seq: 2

request:
  auth:
    type: bearer
    token: "{{clerkToken}}"
  scripts:
    - type: before-request
      code: |-
        // Keeps the clerkToken variable fresh; the folder's bearer auth ({{clerkToken}})
        // is interpolated after this script runs. Needs CLERK_SECRET_KEY and CLERK_USER_ID
        // in api-collections/.env, plus one active session for that user (sign in via the
        // web app; sessions stay active for ~7 days).
        const axios = require('axios');

        // Clerk may cap expires_in_seconds at the instance default (60s), so cache
        // validity comes from the minted token's own exp claim, not the requested lifetime.
        const decodeJwtExp = (jwt) => {
          const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
          const payload = jwt.split('.')[1].replace(/-/g, '+').replace(/_/g, '/').replace(/=+$/, '');
          let bits = 0, buf = 0, json = '';
          for (const c of payload) {
            buf = (buf << 6) | alphabet.indexOf(c);
            bits += 6;
            if (bits >= 8) {
              bits -= 8;
              json += String.fromCharCode((buf >> bits) & 0xff);
            }
          }
          return JSON.parse(json).exp;
        };

        const now = Math.floor(Date.now() / 1000);
        const expiresAt = Number(bru.getVar('clerkTokenExpiresAt') || 0);

        if (!bru.getVar('clerkToken') || now >= expiresAt - 30) {
          const secretKey = bru.getProcessEnv('CLERK_SECRET_KEY');
          const userId = bru.getProcessEnv('CLERK_USER_ID');
          if (!secretKey || !userId) {
            throw new Error('Set CLERK_SECRET_KEY and CLERK_USER_ID in api-collections/.env');
          }

          // Bruno's Safe Mode sandbox ships a limited axios shim without axios.create,
          // so call axios.get/post directly with full URLs.
          const clerkApi = 'https://api.clerk.com/v1';
          const authHeaders = { Authorization: `Bearer ${secretKey}` };

          const sessionsRes = await axios.get(
            `${clerkApi}/sessions?user_id=${encodeURIComponent(userId)}&status=active`,
            { headers: authHeaders }
          );
          const sessions = sessionsRes.data;
          if (!sessions.length) {
            throw new Error('No active Clerk session - sign in via the web app once, then retry.');
          }

          const tokenRes = await axios.post(
            `${clerkApi}/sessions/${sessions[0].id}/tokens`,
            { expires_in_seconds: 3600 },
            { headers: authHeaders }
          );

          const token = tokenRes.data.jwt;
          bru.setVar('clerkToken', token);
          bru.setVar('clerkTokenExpiresAt', decodeJwtExp(token));
        }
